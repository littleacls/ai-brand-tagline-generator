<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/style.css" />
    <title>AI Brand Name & Tagline Generator</title>
  </head>
  <body>
    <header>
      <h1>AI Brand Name & Tagline Generator</h1>
    </header>
    <main>
      <form>
        <input
          type="text"
          placeholder="Enter your idea..."
          required
          autofocus
          autocomplete="off"

      </form>
      <div>
        Brand Name
        <br />
        Tagline
      </div>

      and is

      >
      and hosted on
      <a href="https://aibrandgenerator.vercel.app/" target="_blank">Vercel</a>
    </footer>
    <script src="src/index.js"></script>
  </body>
</html>
